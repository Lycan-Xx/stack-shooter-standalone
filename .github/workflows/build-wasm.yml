name: Build Rust WASM Engine

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    paths:
      # Only run when the Rust source actually changes
      - 'engine-rs/**'
      - '.github/workflows/build-wasm.yml'
  # Allow triggering manually from the GitHub Actions tab
  workflow_dispatch:

# ── Permissions (needed to push the compiled output back) ───────────────────
permissions:
  contents: write

jobs:
  build:
    name: wasm-pack build → src/engine/pkg
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full repo (with history so we can commit back)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Install the exact Rust stable toolchain + wasm target
      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # 3. Cache compiled dependencies so subsequent builds are fast (~30s vs 2min)
      - name: Cache Cargo registry & build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 4. Install wasm-pack (cached by the action itself on repeated runs)
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # 5. Compile the engine
      - name: Build WASM (release)
        working-directory: engine-rs
        run: wasm-pack build --target web --release

      # 6. Sync the compiled output to the location useGameLoop.js imports from
      #    engine-rs/pkg/  →  src/engine/pkg/
      - name: Copy pkg output to src/engine/pkg
        run: |
          rm -rf src/engine/pkg
          mkdir -p src/engine/pkg
          cp -r engine-rs/pkg/. src/engine/pkg/
          # wasm-pack generates a .gitignore with '*' in the output dir. 
          # We must remove it so git can track these files.
          rm -f src/engine/pkg/.gitignore

      # 7. Commit & push only if the compiled output actually changed
      - name: Commit compiled WASM if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the entire directory, including any deleted files
          git add src/engine/pkg/

          # Check whether anything was staged
          if git diff --cached --quiet; then
            echo "No WASM changes — skipping commit."
          else
            COMMIT_SHA="${{ github.sha }}"
            git commit -m "build(wasm): recompile engine-rs → src/engine/pkg [${COMMIT_SHA:0:7}]"
            git push
          fi
