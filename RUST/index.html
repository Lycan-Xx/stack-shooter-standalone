<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Vampire Siege</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0005;
      overflow: hidden;
      touch-action: none; /* prevents mobile scroll/zoom during gameplay */
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    /* Loading indicator shown before WASM initialises */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0d0005; color: #ff3333;
      font-family: monospace; font-size: 1.4rem;
      gap: 1rem;
      z-index: 10;
    }
    #loading .bar-outer {
      width: 260px; height: 12px;
      border: 2px solid #ff3333; border-radius: 6px; overflow: hidden;
    }
    #loading .bar-inner {
      height: 100%; width: 0%;
      background: #ff3333;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>🧛 Vampire Siege</div>
    <div class="bar-outer"><div class="bar-inner" id="progress-bar"></div></div>
    <div id="loading-text">Loading…</div>
  </div>

  <!--
    macroquad generates a single  vampire_siege.js + vampire_siege_bg.wasm
    pair when you run:
      cargo build --release --target wasm32-unknown-unknown
      wasm-bindgen target/wasm32-unknown-unknown/release/vampire_siege.wasm \
        --out-dir dist --target web --no-typescript
  -->
  <script type="module">
    import init from './vampire_siege.js';

    const bar  = document.getElementById('progress-bar');
    const info = document.getElementById('loading-text');

    // Animate loading bar (WASM doesn't expose progress natively,
    // so we fake a smooth fill that completes when init() resolves)
    let pct = 0;
    const tick = setInterval(() => {
      pct = Math.min(pct + Math.random() * 8, 90);
      bar.style.width = pct + '%';
    }, 120);

    await init();

    clearInterval(tick);
    bar.style.width = '100%';
    document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
